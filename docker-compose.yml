services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: Frontend if you want to run both
  client:
    build: ./client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
